name: CI/CD - Build e Deploy no Swarm

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build e Push da imagem da API
        uses: docker/build-push-action@v5
        with:
          context: ./estoque/app
          push: true
          tags: gbrhhenri/grupo06-app:latest

      - name: Build e Push da imagem do Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./estoque/frontend
          push: true
          tags: gbrhhenri/grupo06-frontend:latest

      - name: Deploy no Docker Swarm via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker pull gbrhhenri/grupo06-app:latest
            docker pull gbrhhenri/grupo06-frontend:latest
            docker service update --image gbrhhenri/grupo06-app:latest --force grupo06-swarm-stack_app
            docker service update --image gbrhhenri/grupo06-frontend:latest --force grupo06-swarm-stack_frontend
