name: CI/CD - Build e Deploy no Swarm

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build e Push da imagem da API
        uses: docker/build-push-action@v5
        with:
          context: ./estoque/app
          push: true
          tags: gbrhhenri/grupo06-app:latest

      - name: Build e Push da imagem do Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./estoque/frontend
          push: true
          tags: gbrhhenri/grupo06-frontend:latest

      - name: Atualiza imagens
        run: |
          docker pull gbrhhenri/grupo06-app:latest
          docker pull gbrhhenri/grupo06-frontend:latest

      - name: Atualiza serviços do Swarm
        run: |
          docker service update \
            --image gbrhhenri/grupo06-app:latest \
            --force \
            grupo06-swarm-stack_app

          docker service update \
            --image gbrhhenri/grupo06-frontend:latest \
            --force \
            grupo06-swarm-stack_frontend
