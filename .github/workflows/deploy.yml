name: CI/CD - Build e Deploy no Swarm

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build e Push da imagem da API
        uses: docker/build-push-action@v5
        with:
          context: ./estoque/app
          push: true
          tags: gbrhhenri/grupo06-app:latest

      - name: Build e Push da imagem do Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./estoque/frontend
          push: true
          tags: gbrhhenri/grupo06-frontend:latest

      - name: Atualiza serviços no Swarm via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 177.86.167.218
          username: grupo06
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker service update --image gbrhhenri/grupo06-app:latest grupo06-swarm-stack_app --with-registry-auth
            docker service update --image gbrhhenri/grupo06-frontend:latest grupo06-swarm-stack_frontend --with-registry-auth
