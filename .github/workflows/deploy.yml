name: CI/CD - Build e Deploy no Swarm

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build e Push da imagem da API
        uses: docker/build-push-action@v5
        with:
          context: ./estoque/app
          push: true
          tags: gbrhhenri/grupo06-app:latest

      - name: Build e Push da imagem do Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./estoque/frontend
          push: true
          tags: gbrhhenri/grupo06-frontend:latest

      - name: Dispara webhook app no Portainer
        run: |
          curl -X POST ${{ secrets.PORTAINER_WEBHOOK_APP }}

      - name: Dispara webhook frontend no Portainer
        run: |
          curl -X POST ${{ secrets.PORTAINER_WEBHOOK_FRONTEND }}
